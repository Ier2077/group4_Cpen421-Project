# ─────────────────────────────────────────────────────────
# Render Blueprint – Emergency Response Platform
# Deploy: push repo to GitHub → Render Dashboard → "New Blueprint Instance"
# ─────────────────────────────────────────────────────────

databases:
  - name: erp-database
    plan: free            # 1 shared Postgres (expires after 90 days on free)
    databaseName: erp_db
    user: erp_user

services:
  # ── Auth Service ──────────────────────────────────────
  - type: web
    name: erp-auth-service
    runtime: docker
    plan: free
    dockerfilePath: services/auth_service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-database
          property: connectionString
        
      - key: JWT_SECRET
        generateValue: true
      - key: RABBITMQ_URL
        sync: false        
      - key: FRONTEND_URL
        sync: false

  # ── Incident Service ──────────────────────────────────
  - type: web
    name: erp-incident-service
    runtime: docker
    plan: free
    dockerfilePath: services/incident_service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-database
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: erp-auth-service
          envVarKey: JWT_SECRET
      - key: RABBITMQ_URL
        sync: false
      - key: DISPATCH_SERVICE_URL
        sync: false        

  # ── Dispatch Service ──────────────────────────────────
  - type: web
    name: erp-dispatch-service
    runtime: docker
    plan: free
    dockerfilePath: services/dispatch_service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-database
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: erp-auth-service
          envVarKey: JWT_SECRET
      - key: RABBITMQ_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: erp-redis
          property: connectionString

  # ── Analytics Service ─────────────────────────────────
  - type: web
    name: erp-analytics-service
    runtime: docker
    plan: free
    dockerfilePath: services/analytics_service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-database
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: erp-auth-service
          envVarKey: JWT_SECRET
      - key: RABBITMQ_URL
        sync: false

  # ── API Gateway ───────────────────────────────────────
  # Frontend talks to this ONE URL — it proxies to all backend services
  - type: web
    name: erp-gateway
    runtime: docker
    plan: free
    dockerfilePath: services/gateway/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: AUTH_SERVICE_URL
        sync: false        
      - key: INCIDENT_SERVICE_URL
        sync: false        
      - key: DISPATCH_SERVICE_URL
        sync: false        
      - key: ANALYTICS_SERVICE_URL
        sync: false       
      - key: ALLOWED_ORIGINS
        sync: false        

  # ── Redis ─────────────────────────────────────────────
  - type: redis
    name: erp-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
